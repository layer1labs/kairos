# Kairos Amber — BitConcepts official theme
# Matches the Kairos brand palette: amber-gold on near-black.
# Install: copy to %APPDATA%\kairos\data\themes\kairos_amber.yaml
# then select "Kairos Amber" in Settings → Appearance → Themes.
