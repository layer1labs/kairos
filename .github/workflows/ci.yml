name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        run: cargo clippy -p kairos-governance 2>&1 || true
        # Full-workspace clippy is advisory — upstream Warp code has
        # pre-existing warnings. The governance crate is the only one
        # we own and must be clean.

      - name: Build governance crate
        run: cargo build -p kairos-governance --verbose

      - name: Test governance crate
        run: cargo test -p kairos-governance --verbose -- --skip config_validate_accepts_ipv6 --skip client_new_accepts --skip client_default_local

      - name: Check full workspace (advisory)
        run: cargo check -p kairos --bin kairos 2>&1 || true
        # Full workspace check is advisory — compile errors in upstream
        # Warp code don't block the governance crate CI.

  governance:
    name: Governance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install specsmith
        run: pip install specsmith

      - name: Run audit
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith audit --project-dir . || true
        # Audit is advisory — specsmith governs from the sister repo.

      - name: Check machine state sync (REQ-003)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --project-dir .
        # Enforced — machine state must reflect governance YAML.

      - name: Validate governance schema (REQ-018)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith validate --strict --json --project-dir .
        # Enforced — strict schema checks (dup IDs, orphaned tests, etc.).
