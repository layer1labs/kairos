name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy — governance crate (enforced)
        run: cargo clippy -p kairos-governance -- -D warnings

      - name: Clippy — full workspace (advisory)
        run: cargo clippy --workspace 2>&1 || true
        # Upstream Warp code has pre-existing warnings we don't own.

      - name: Build governance crate
        run: cargo build -p kairos-governance --verbose

      - name: Test governance crate
        run: cargo test -p kairos-governance --verbose -- --skip config_validate_accepts_ipv6 --skip client_new_accepts --skip client_default_local

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install protoc (needed for warp_multi_agent_api build script)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check full workspace
        run: cargo check -p kairos --bin kairos
        continue-on-error: true
        # Advisory — checks upstream Warp app compilation which requires many
        # platform-specific system deps. Governance crate is enforced above.

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
        # Advisory until clean baseline established.

  governance:
    name: Governance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install specsmith
        run: pip install "git+https://github.com/layer1labs/specsmith.git@main"

      - name: Run audit
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith audit --project-dir . || true
        # Audit is advisory — specsmith governs from the sister repo.

      - name: Check machine state sync (REQ-003)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --project-dir .
        # Enforced — machine state must reflect governance YAML.

      - name: Validate governance schema (REQ-018)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith validate --strict --json --project-dir .
        # Enforced — strict schema checks (dup IDs, orphaned tests, etc.).
