name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 2 * * 1'  # Weekly Monday 02:30 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-python-actions:
    name: Analyze (Python + Actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,actions
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python+actions"

  analyze-rust:
    name: Analyze (Rust — kairos-governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-extended,security-and-quality

      - name: Build kairos-governance for CodeQL
        # Only build the crate we own — avoids compiling the full Warp workspace
        run: cargo build -p kairos-governance

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
